version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: qnm-opensoho_server_1
      APP_PORT: 8090

  server:
    image: ghcr.io/opensoho/opensoho:v0.10.2@sha256:6920224f999bd2d447cc10e447665ac5b526fa169bcf63d4a5b36e0bfa0d5a08
    command: "serve --http 0.0.0.0:8090"
    user: "1000:1000"
    init: true
    restart: on-failure
    environment:
      OPENSOHO_SHARED_SECRET: $APP_SEED
    volumes:
      - ${APP_DATA_DIR}/data/pb_data:/ko-app/pb_data
